# The Site Configuration — MS KR Security Blog (test on akimcse personal account)

theme: jekyll-theme-chirpy

# Korean layout (Chirpy ships the ko-KR locale)
lang: ko-KR
timezone: Asia/Seoul

# --- jekyll-seo-tag ---
title: MS KR Security Blog
tagline: 한국 마이크로소프트 보안 전문가들이 전하는 시큐리티 인사이트
description: >-
  Microsoft Security Blog의 핵심 글을 한국어로 번역·정리하고,
  Purview · Defender · Sentinel · Entra · Intune · Security Copilot · Agent 365
  솔루션별 인사이트를 전달하는 기술 블로그입니다.

# Project site on a personal GitHub Pages account:
# https://akimcse.github.io/securitykorea
url: "https://akimcse.github.io"
baseurl: "/securitykorea"

github:
  username: akimcse

twitter:
  username:

social:
  name: MS KR Security
  email: example@microsoft.com
  fediverse_handle:
  links:
    - https://github.com/akimcse

webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

pageviews:
  provider:

theme_mode: # [light | dark]

cdn:

avatar:

social_preview_image:

toc: true

comments:
  provider:
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

assets:
  self_host:
    enabled:
    env:

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - package*.json
  - automation        # crawler scripts must not be served as site content

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
