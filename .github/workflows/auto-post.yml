name: "Auto Post (crawl + translate + PR + Teams alert)"

on:
  schedule:
    - cron: "0 0 * * *"          # daily, 00:00 UTC (09:00 KST)
  workflow_dispatch:
    inputs:
      max:
        description: "Max new items to process"
        required: false
        default: "5"
      all_solutions:
        description: "Process all solutions (ignore enabled flags)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r automation/requirements.txt

      - name: Run crawler
        id: crawl
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
        run: |
          ARGS="--max ${{ github.event.inputs.max || '5' }}"
          if [ "${{ github.event.inputs.all_solutions }}" = "true" ]; then
            ARGS="$ARGS --all-solutions"
          fi
          python automation/crawl_translate.py $ARGS

      - name: Create branch, commit, open PR
        id: pr
        if: steps.crawl.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTS: ${{ steps.crawl.outputs.posts }}
          COUNT: ${{ steps.crawl.outputs.count }}
        run: |
          set -e
          BRANCH="auto-post/${{ github.run_id }}"
          git config user.name  "ms-kr-security-bot"
          git config user.email "actions@github.com"
          git checkout -b "$BRANCH"
          git add _posts automation/state/processed.json
          git commit -m "auto: ${COUNT} new translated post(s)"
          git push origin "$BRANCH"

          # Build a Markdown PR body listing each post + owner.
          python - <<'PY' > pr_body.md
          import json, os
          posts = json.loads(os.environ["POSTS"])
          lines = ["## 자동 생성된 번역 포스트 검수 요청\n",
                   "아래 글이 게시 대기 중입니다. **이 PR을 머지하면** 게시 파이프라인이 시작되고,",
                   "GitHub Pages 배포 단계에서 담당자 최종 승인을 거쳐 게시됩니다.\n"]
          for p in posts:
              owners = ", ".join("@"+o for o in p["owners"])
              lines.append(f"- **{p['ko_title']}**  ")
              lines.append(f"  - 솔루션: `{p['solution_label']}` · 담당: {owners}")
              lines.append(f"  - 원문: {p['source_url']}")
              lines.append(f"  - 파일: `{p['post_path']}`")
          print("\n".join(lines))
          PY

          PR_URL=$(gh pr create --title "auto-post: 번역 포스트 검수 (${COUNT}건)" \
            --body-file pr_body.md --label "auto-post,pending-approval" --base main --head "$BRANCH")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          rm -f pr_body.md

      - name: Send Teams approval alert
        if: steps.crawl.outputs.count != '0' && env.TEAMS_WEBHOOK_URL != ''
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          POSTS: ${{ steps.crawl.outputs.posts }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          posts = json.loads(os.environ.get("POSTS", "[]"))
          pr_url = os.environ.get("PR_URL", "")
          facts = []
          body_items = []
          for p in posts:
              owners = ", ".join(p["owners"])
              body_items.append({
                  "type": "TextBlock", "wrap": True,
                  "text": f"**{p['ko_title']}**\n\n솔루션: {p['solution_label']} · 담당: {owners}"
              })
          card = {
              "type": "message",
              "attachments": [{
                  "contentType": "application/vnd.microsoft.card.adaptive",
                  "content": {
                      "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                      "type": "AdaptiveCard", "version": "1.4",
                      "body": [
                          {"type": "TextBlock", "size": "Large", "weight": "Bolder",
                           "text": "🔐 MS KR Security Blog — 게시 승인 요청"},
                          {"type": "TextBlock", "wrap": True,
                           "text": f"{len(posts)}건의 번역 포스트가 검수를 기다립니다. PR을 검토 후 머지하면 게시가 진행됩니다."},
                          *body_items
                      ],
                      "actions": [
                          {"type": "Action.OpenUrl", "title": "PR 검토하기", "url": pr_url}
                      ] if pr_url else []
                  }
              }]
          }
          req = urllib.request.Request(os.environ["TEAMS_WEBHOOK_URL"],
                                       data=json.dumps(card).encode("utf-8"),
                                       headers={"Content-Type": "application/json"},
                                       method="POST")
          with urllib.request.urlopen(req, timeout=30) as r:
              print("Teams webhook status:", r.status)
          PY
