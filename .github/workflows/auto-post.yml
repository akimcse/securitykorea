name: "Auto Post (crawl + translate + PR + Teams alert)"

on:
  schedule:
    - cron: "0 0 * * *"          # daily, 00:00 UTC (09:00 KST)
  workflow_dispatch:
    inputs:
      max:
        description: "Max new items to process"
        required: false
        default: "5"
      all_solutions:
        description: "Process all solutions (ignore enabled flags)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r automation/requirements.txt

      - name: Run crawler
        id: crawl
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
        run: |
          ARGS="--max ${{ github.event.inputs.max || '5' }}"
          if [ "${{ github.event.inputs.all_solutions }}" = "true" ]; then
            ARGS="$ARGS --all-solutions"
          fi
          python automation/crawl_translate.py $ARGS

      - name: Create branch, commit, open PR
        id: pr
        if: steps.crawl.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTS: ${{ steps.crawl.outputs.posts }}
          COUNT: ${{ steps.crawl.outputs.count }}
        run: |
          set -e
          BRANCH="auto-post/${{ github.run_id }}"
          git config user.name  "ms-kr-security-bot"
          git config user.email "actions@github.com"
          git checkout -b "$BRANCH"
          git add _posts automation/state/processed.json
          git commit -m "auto: ${COUNT} new translated post(s)"
          git push origin "$BRANCH"

          # Ensure labels exist (idempotent) so PR creation never fails on missing labels.
          gh label create "auto-post" --color "1f6feb" --description "Auto-generated translated post" 2>/dev/null || true
          gh label create "pending-approval" --color "d4a72c" --description "Awaiting owner review/merge" 2>/dev/null || true

          # Build a Markdown PR body listing each post + owner.
          python - <<'PY' > pr_body.md
          import json, os
          posts = json.loads(os.environ["POSTS"])
          lines = ["## 자동 생성된 번역 포스트 검수 요청\n",
                   "아래 글이 게시 대기 중입니다. **이 PR을 머지하면** 게시 파이프라인이 시작되고,",
                   "GitHub Pages 배포 단계에서 담당자 최종 승인을 거쳐 게시됩니다.\n"]
          for p in posts:
              owners = ", ".join("@"+o for o in p["owners"])
              lines.append(f"- **{p['ko_title']}**  ")
              lines.append(f"  - 솔루션: `{p['solution_label']}` · 담당: {owners}")
              lines.append(f"  - 원문: {p['source_url']}")
              lines.append(f"  - 파일: `{p['post_path']}`")
          print("\n".join(lines))
          PY

          PR_URL=$(gh pr create --title "auto-post: 번역 포스트 검수 (${COUNT}건)" \
            --body-file pr_body.md --label "auto-post,pending-approval" --base main --head "$BRANCH")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          rm -f pr_body.md

      - name: Request reviewers (GitHub email notifications)
        if: steps.crawl.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          POSTS: ${{ steps.crawl.outputs.posts }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
        run: |
          # Collect the unique solution owners across all posts in this PR and add
          # them as PR reviewers. GitHub then emails each reviewer (and sends a
          # web/mobile notification) — this is our approval alert, no webhook needed.
          # Owner ids that are not valid GitHub logins (e.g. unmapped placeholders)
          # are skipped without failing the workflow.
          REVIEWERS=$(python - <<'PY'
          import json, os
          posts = json.loads(os.environ.get("POSTS", "[]"))
          seen = []
          for p in posts:
              for o in p.get("owners", []):
                  if o and o not in seen:
                      seen.append(o)
          print(" ".join(seen))
          PY
          )
          echo "Candidate reviewers: $REVIEWERS"
          for r in $REVIEWERS; do
            if gh pr edit "$PR_URL" --add-reviewer "$r" 2>/dev/null; then
              echo "  + requested review from $r"
            else
              echo "  ! could not add reviewer '$r' (not a valid/collaborator GitHub login) — skipped"
            fi
          done
